model:
  base_learning_rate: 1.0e-04
  target: ldm.models.da_autoencoder.DAVAE
  params:
    monitor: val/rec_loss

    # Base (pretrained, frozen) encoder ckpt
    base_ckpt_path: /path/to/your/vavae-imagenet256-f16d32-dinov2.pt
    # Optional: load DA encoder/decoder from a pretrained checkpoint
    da_ckpt_path: /path/to/your/davae_checkpoint.pt

    # Latent sizes
    base_embed_dim: 32

    # Alignment method: "proj" (learned projection) or "mean" (group mean)
    align_method: mean
    da_mode: detail

    z_hc_dropout_p: 0.1
    z_hc_dropout_mode: sample
    # Loss (LPIPS + GAN); keep same as baseline
    lossconfig:
      target: ldm.modules.losses.LPIPSWithDiscriminator
      params:
        disc_start: 5001
        kl_weight: 1.0e-06
        disc_weight: 0.1
        adaptive_vf: true
        vf_weight: 0.5
        distmat_margin: 0.0
        cos_margin: 0.0
        pp_style: true

    # Base encoder config (frozen)
    ddconfig_base:
      double_z: true
      z_channels: 32
      resolution: 256
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult:
      - 1
      - 1
      - 2
      - 2
      - 4
      num_res_blocks: 2
      attn_resolutions:
      - 16
      dropout: 0.0

    # DA path config (trainable)
    ddconfig_da:
      double_z: true
      z_channels: 32
      resolution: 512
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult:
      - 1
      - 1
      - 2
      - 2
      - 4
      num_res_blocks: 2
      attn_resolutions:
      - 32
      dropout: 0.0

    # DC model options
    enable_deep_compress: true
    upsample_interpolation: nearest

# Data module configuration
# Replace with your own DataModule that loads image data for training.
# Example: use a PyTorch Lightning DataModule that provides (image, label) batches.
data:
  target: ldm.data.base.Txt2ImgIterableBaseDataset
  params:
    data_dir: /path/to/your/imagenet/data
    batch_size: 8
    image_size: 512
    num_workers: 8


lightning:
  trainer:
    devices: 8
    num_nodes: 1
    strategy: ddp_find_unused_parameters_true
    accelerator: gpu
    max_epochs: 50
    precision: bf16
    val_check_interval: 5000 # every 5000 steps
    log_every_n_steps: 1
    limit_val_batches: 100 

  callbacks:
    metrics_over_trainsteps_checkpoint:
      every_n_train_steps: 5000

  logger:
    name: wandb
    project: davae-dc-f16d32-piat-diff-align-mean
    entity: ${env:WANDB_ENTITY,your-entity}
    version: main



